workspace:
  root: ./workspace

provider:
  kind: openai
  model: gpt-5-mini
  openai_api_variant: responses
  conversation_mode: auto
  api_key_env: OPENAI_API_KEY
  temperature: 0.2

agent:
  system_prompt: You are a concise assistant. Use tools when needed.
  budget:
    max_steps: 10
    time_budget_s: 120
    max_input_chars: 20000

tools:
  allowed:
    - view
    - create_file
    - str_replace
    - word_count

runlog:
  enabled: true
  redact: true
  max_text_chars: 20000
